<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TokenKill</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --bg:       #0d0d0d;
      --surface:  #131313;
      --border:   #1f1f1f;
      --muted:    #2a2a2a;
      --text:     #e8e8e8;
      --sub:      #888;
      --dim:      #444;
      --amber:    #f59e0b;
      --blue:     #60a5fa;
      --violet:   #a78bfa;
      --green:    #34d399;
      --red:      #f87171;
    }
    * { font-family: 'Syne', sans-serif; box-sizing: border-box; }
    .code { font-family: 'Fira Code', monospace !important; }
    body { background: var(--bg); color: var(--text); }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 2px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; }
    .label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--sub);
    }
    .stat {
      font-family: 'Fira Code', monospace;
      font-size: 26px;
      font-weight: 500;
      line-height: 1;
      letter-spacing: -.02em;
    }

    /* live pulse */
    @keyframes live-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }
    .live-dot { animation: live-pulse 2s ease-in-out infinite; }

    /* row hover */
    tbody tr { transition: background 80ms; }
    tbody tr:hover { background: rgba(255,255,255,.03); }
  </style>
</head>
<body class="min-h-screen antialiased">

  <!-- ── Header ─────────────────────────────────────── -->
  <header style="border-bottom:1px solid var(--border); background:rgba(13,13,13,.92); backdrop-filter:blur(8px);"
          class="sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-6 h-14 flex items-center justify-between">

      <div class="flex items-center gap-3">
        <i data-lucide="shield" style="width:16px;height:16px;color:var(--amber);"></i>
        <span style="font-size:15px;font-weight:800;letter-spacing:-.01em;">TokenKill</span>
        <span style="color:var(--border);margin:0 4px;">|</span>
        <span class="code" id="session-id" style="font-size:11px;color:var(--sub);">connecting…</span>
      </div>

      <div class="flex items-center gap-2">
        <span id="status-dot" class="live-dot" style="width:6px;height:6px;border-radius:50%;background:var(--dim);display:inline-block;"></span>
        <span class="label" id="status-text">offline</span>
      </div>

    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8" style="display:flex;flex-direction:column;gap:16px;">

    <!-- ── Alert ───────────────────────────────────────── -->
    <div id="alert-banner" class="hidden" style="border-radius:8px;border:1px solid;padding:12px 16px;display:none;align-items:center;gap:10px;">
      <i data-lucide="alert-triangle" style="width:15px;height:15px;shrink:0;"></i>
      <div>
        <p style="font-size:12px;font-weight:700;margin:0;" id="alert-title"></p>
        <p class="code" style="font-size:11px;margin:2px 0 0;opacity:.75;" id="alert-text"></p>
      </div>
    </div>

    <!-- ── KPI row ─────────────────────────────────────── -->
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;" class="lg-4-col">
      <style>.lg-4-col { } @media(min-width:900px){.lg-4-col{grid-template-columns:repeat(4,1fr)!important;}}</style>

      <div class="card" style="padding:20px 22px;">
        <div class="label" style="display:flex;align-items:center;gap:6px;margin-bottom:16px;">
          <i data-lucide="circle-dollar-sign" style="width:11px;height:11px;"></i> Session Cost
        </div>
        <div class="stat" id="session-cost" style="color:var(--amber);">$0.0000</div>
        <div class="code" id="burn-rate" style="font-size:10px;color:var(--dim);margin-top:6px;">—</div>
      </div>

      <div class="card" style="padding:20px 22px;">
        <div class="label" style="display:flex;align-items:center;gap:6px;margin-bottom:16px;">
          <i data-lucide="arrow-down-to-line" style="width:11px;height:11px;"></i> Input Tokens
        </div>
        <div class="stat code" id="input-tokens" style="color:var(--blue);">0</div>
        <div style="font-size:10px;color:var(--dim);margin-top:6px;">tokens</div>
      </div>

      <div class="card" style="padding:20px 22px;">
        <div class="label" style="display:flex;align-items:center;gap:6px;margin-bottom:16px;">
          <i data-lucide="arrow-up-from-line" style="width:11px;height:11px;"></i> Output Tokens
        </div>
        <div class="stat code" id="output-tokens" style="color:var(--violet);">0</div>
        <div style="font-size:10px;color:var(--dim);margin-top:6px;">tokens</div>
      </div>

      <div class="card" style="padding:20px 22px;">
        <div class="label" style="display:flex;align-items:center;gap:6px;margin-bottom:16px;">
          <i data-lucide="layers" style="width:11px;height:11px;"></i> Requests
        </div>
        <div class="stat code" id="request-count">0</div>
        <div style="font-size:10px;color:var(--dim);margin-top:6px;">intercepted</div>
      </div>

    </div>

    <!-- ── Budget ──────────────────────────────────────── -->
    <div class="card" style="padding:16px 22px;">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
        <div class="label" style="display:flex;align-items:center;gap:6px;">
          <i data-lucide="gauge" style="width:11px;height:11px;"></i> Budget
        </div>
        <span class="code" id="budget-label" style="font-size:11px;color:var(--sub);">No cap set</span>
      </div>
      <div style="height:3px;background:var(--muted);border-radius:2px;overflow:hidden;">
        <div id="budget-fill" style="height:100%;width:0%;background:var(--green);border-radius:2px;transition:width .5s ease,background .3s;"></div>
      </div>
      <div class="code" id="budget-eta" style="font-size:10px;color:var(--dim);margin-top:6px;"></div>
    </div>

    <!-- ── Charts ─────────────────────────────────────── -->
    <div style="display:grid;grid-template-columns:1fr;gap:12px;" class="charts-grid">
      <style>@media(min-width:768px){.charts-grid{grid-template-columns:3fr 2fr!important;}}</style>

      <div class="card" style="padding:20px 22px;">
        <div class="label" style="display:flex;align-items:center;gap:6px;margin-bottom:16px;">
          <i data-lucide="trending-up" style="width:11px;height:11px;"></i> Cost Over Time
        </div>
        <canvas id="cost-chart" height="100"></canvas>
      </div>

      <div class="card" style="padding:20px 22px;">
        <div class="label" style="display:flex;align-items:center;gap:6px;margin-bottom:16px;">
          <i data-lucide="pie-chart" style="width:11px;height:11px;"></i> By Provider
        </div>
        <canvas id="provider-chart" height="100"></canvas>
      </div>

    </div>

    <!-- ── Attribution ────────────────────────────────── -->
    <div style="display:grid;grid-template-columns:1fr;gap:12px;" class="attr-grid">
      <style>@media(min-width:640px){.attr-grid{grid-template-columns:1fr 1fr!important;}}</style>

      <div class="card" style="padding:20px 22px;">
        <div class="label" style="display:flex;align-items:center;gap:6px;margin-bottom:16px;">
          <i data-lucide="wrench" style="width:11px;height:11px;"></i> Top Tools
        </div>
        <div id="tool-list" style="display:flex;flex-direction:column;gap:10px;"></div>
      </div>

      <div class="card" style="padding:20px 22px;">
        <div class="label" style="display:flex;align-items:center;gap:6px;margin-bottom:16px;">
          <i data-lucide="file-text" style="width:11px;height:11px;"></i> Top Files
        </div>
        <div id="file-list" style="display:flex;flex-direction:column;gap:10px;"></div>
      </div>

    </div>

    <!-- ── Events ─────────────────────────────────────── -->
    <div class="card" style="overflow:hidden;">
      <div style="padding:14px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;">
        <i data-lucide="list" style="width:11px;height:11px;color:var(--sub);"></i>
        <span class="label">Recent Events</span>
      </div>
      <div style="overflow-x:auto;">
        <table style="width:100%;border-collapse:collapse;">
          <thead>
            <tr style="border-bottom:1px solid var(--border);">
              <th class="label" style="text-align:left;padding:10px 22px;font-weight:700;">Time</th>
              <th class="label" style="text-align:left;padding:10px 8px;">Provider</th>
              <th class="label" style="text-align:left;padding:10px 8px;">Model</th>
              <th class="label" style="text-align:right;padding:10px 8px;">In</th>
              <th class="label" style="text-align:right;padding:10px 8px;">Out</th>
              <th class="label" style="text-align:right;padding:10px 8px;">Cost</th>
              <th class="label" style="text-align:left;padding:10px 8px;padding-right:22px;">Tool</th>
            </tr>
          </thead>
          <tbody id="events-table"></tbody>
        </table>
      </div>
    </div>

  </main>

<script>
  // ── State ──────────────────────────────────────────────
  let totalCost = 0, inputTokens = 0, outputTokens = 0, requestCount = 0;
  let costHistory = [], providerCosts = {}, toolCosts = {}, fileCosts = {};
  let sessionId = null;

  // ── Charts ─────────────────────────────────────────────
  const G = '#1f1f1f', T = '#555', FIRA = 'Fira Code, monospace';

  const costChart = new Chart(document.getElementById('cost-chart').getContext('2d'), {
    type: 'line',
    data: { labels: [], datasets: [{ data: [], borderColor: '#f59e0b', borderWidth: 1.5,
      tension: 0.4, fill: true, backgroundColor: 'rgba(245,158,11,.06)',
      pointRadius: 0, pointHoverRadius: 3, pointHoverBackgroundColor: '#f59e0b' }] },
    options: {
      plugins: { legend: { display: false } },
      scales: {
        x: { ticks: { color: T, font: { size: 9, family: FIRA }, maxTicksLimit: 7, maxRotation: 0 },
             grid: { color: G }, border: { color: G } },
        y: { ticks: { color: T, font: { size: 9, family: FIRA }, callback: v => '$'+v.toFixed(4) },
             grid: { color: G }, border: { color: G } }
      },
      animation: false, interaction: { mode: 'index', intersect: false },
    }
  });

  const provChart = new Chart(document.getElementById('provider-chart').getContext('2d'), {
    type: 'doughnut',
    data: { labels: [], datasets: [{ data: [],
      backgroundColor: ['#f59e0b','#60a5fa','#34d399','#a78bfa'],
      borderColor: '#131313', borderWidth: 3 }] },
    options: {
      plugins: { legend: { labels: { color: '#888', font: { size: 11, family: 'Syne, sans-serif' },
        padding: 14, boxWidth: 8, boxHeight: 8 } } },
      cutout: '70%', animation: false,
    }
  });

  // ── WebSocket ──────────────────────────────────────────
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/dashboard/ws`);
    ws.onopen  = () => { setStatus(true);  loadCurrent(); };
    ws.onclose = () => { setStatus(false); setTimeout(connect, 3000); };
    ws.onmessage = e => { const m = JSON.parse(e.data); if (m.type === 'cost_event') handleEvent(m); };
    setInterval(() => { if (ws.readyState === 1) ws.send('ping'); }, 20000);
  }

  function setStatus(live) {
    document.getElementById('status-dot').style.background = live ? 'var(--green)' : 'var(--dim)';
    document.getElementById('status-text').textContent     = live ? 'live' : 'offline';
    document.getElementById('status-text').style.color     = live ? 'var(--green)' : 'var(--sub)';
  }

  // ── Load session ───────────────────────────────────────
  async function loadCurrent() {
    const [curR, budR] = await Promise.all([
      fetch('/dashboard/api/current'),
      fetch('/dashboard/api/budget'),
    ]);
    const data   = await curR.json();
    const budget = await budR.json();
    renderBudget(budget);
    if (!data.active) return;

    const s = data.session;
    sessionId    = s.id;
    totalCost    = s.total_cost_usd;
    inputTokens  = s.total_input_tokens;
    outputTokens = s.total_output_tokens;
    requestCount = s.event_count;
    document.getElementById('session-id').textContent = `${s.id.slice(0,8)} · ${s.project}`;

    if (data.cost_tree) {
      providerCosts = data.cost_tree.by_provider || {};
      toolCosts     = data.cost_tree.by_tool     || {};
      fileCosts     = data.cost_tree.by_file      || {};
    }

    try {
      const evR    = await fetch(`/dashboard/api/sessions/${sessionId}/events`);
      const events = await evR.json();
      let run = 0;
      costHistory = events.map(ev => { run += ev.cost_usd; return { t: new Date(ev.timestamp).toLocaleTimeString(), c: run }; });
      if (costHistory.length > 60) costHistory = costHistory.slice(-60);
      const tbody = document.getElementById('events-table');
      tbody.innerHTML = '';
      events.slice(-50).reverse().forEach(ev => tbody.appendChild(buildRow(ev)));
    } catch (_) {}

    renderAll();
  }

  // ── Live event ─────────────────────────────────────────
  function handleEvent(msg) {
    const ev = msg.event, b = msg.budget;
    totalCost    += ev.cost_usd;
    inputTokens  += ev.usage.input_tokens;
    outputTokens += ev.usage.output_tokens;
    requestCount += 1;
    providerCosts[ev.provider] = (providerCosts[ev.provider] || 0) + ev.cost_usd;
    if (ev.tool_name) toolCosts[ev.tool_name] = (toolCosts[ev.tool_name] || 0) + ev.cost_usd;
    if (ev.file_path) fileCosts[ev.file_path] = (fileCosts[ev.file_path] || 0) + ev.cost_usd;
    costHistory.push({ t: new Date().toLocaleTimeString(), c: totalCost });
    if (costHistory.length > 60) costHistory.shift();
    renderAll(); renderBudget(b); prependEvent(ev);
    if (msg.loop_alert) showAlert(msg.loop_alert); else clearAlert();
  }

  // ── Render ─────────────────────────────────────────────
  function renderAll() {
    document.getElementById('session-cost').textContent  = '$' + totalCost.toFixed(4);
    document.getElementById('input-tokens').textContent  = inputTokens.toLocaleString();
    document.getElementById('output-tokens').textContent = outputTokens.toLocaleString();
    document.getElementById('request-count').textContent = requestCount.toLocaleString();

    costChart.data.labels           = costHistory.map(h => h.t);
    costChart.data.datasets[0].data = costHistory.map(h => h.c);
    costChart.update();

    const pk = Object.keys(providerCosts);
    provChart.data.labels           = pk;
    provChart.data.datasets[0].data = pk.map(k => providerCosts[k]);
    provChart.update();

    renderList('tool-list', toolCosts);
    renderList('file-list', fileCosts);
  }

  function renderList(id, costs) {
    const el     = document.getElementById(id);
    const sorted = Object.entries(costs).sort((a,b) => b[1]-a[1]).slice(0,8);
    if (!sorted.length) { el.innerHTML = '<span style="font-size:11px;color:var(--dim);">No data yet</span>'; return; }
    const max = sorted[0][1];
    el.innerHTML = sorted.map(([k,v]) => `
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
        <div style="flex:1;min-width:0;">
          <p style="font-size:11px;font-family:Fira Code,monospace;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0 0 4px;" title="${k}">${k}</p>
          <div style="height:2px;background:var(--muted);border-radius:1px;overflow:hidden;">
            <div style="height:100%;width:${(v/max*100).toFixed(1)}%;background:var(--border);border-radius:1px;"></div>
          </div>
        </div>
        <span style="font-size:11px;font-family:Fira Code,monospace;color:var(--amber);white-space:nowrap;">$${v.toFixed(4)}</span>
      </div>`).join('');
  }

  function renderBudget(b) {
    const label = document.getElementById('budget-label');
    const fill  = document.getElementById('budget-fill');
    const eta   = document.getElementById('budget-eta');
    if (!b.session_cap && !b.project_cap) {
      label.textContent = 'no cap set'; fill.style.width = '0%'; eta.textContent = ''; return;
    }
    const pct = b.session_pct || b.project_pct || 0;
    const pctD = Math.min(pct*100,100).toFixed(1);
    const cap  = b.session_cap || b.project_cap;
    label.textContent = `$${(b.session_spent||0).toFixed(4)} / $${cap.toFixed(2)}  (${pctD}%)`;
    fill.style.width      = pctD + '%';
    fill.style.background = pct >= 1.0 ? 'var(--red)' : pct >= 0.8 ? '#f59e0b' : 'var(--green)';
    if (b.estimated_minutes_remaining != null) eta.textContent = `~${b.estimated_minutes_remaining.toFixed(0)} min remaining`;
    if (b.burn_rate) document.getElementById('burn-rate').textContent = `$${b.burn_rate.toFixed(4)}/min`;
  }

  // ── Events table ───────────────────────────────────────
  function buildRow(ev) {
    const tr = document.createElement('tr');
    tr.style.cssText = 'border-bottom:1px solid var(--border);';
    tr.innerHTML = `
      <td style="padding:10px 22px;font-family:Fira Code,monospace;font-size:10px;color:var(--dim);white-space:nowrap;">${new Date(ev.timestamp).toLocaleTimeString()}</td>
      <td style="padding:10px 8px;font-size:11px;font-weight:700;color:var(--blue);text-transform:capitalize;">${ev.provider}</td>
      <td style="padding:10px 8px;font-family:Fira Code,monospace;font-size:10px;color:#999;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${ev.model}">${ev.model}</td>
      <td style="padding:10px 8px;text-align:right;font-family:Fira Code,monospace;font-size:11px;color:#777;">${(ev.usage?.input_tokens||0).toLocaleString()}</td>
      <td style="padding:10px 8px;text-align:right;font-family:Fira Code,monospace;font-size:11px;color:#777;">${(ev.usage?.output_tokens||0).toLocaleString()}</td>
      <td style="padding:10px 8px;text-align:right;font-family:Fira Code,monospace;font-size:11px;color:var(--amber);font-weight:500;">$${ev.cost_usd.toFixed(4)}</td>
      <td style="padding:10px 8px;padding-right:22px;font-family:Fira Code,monospace;font-size:10px;color:var(--dim);max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${ev.tool_name||''}">${ev.tool_name||'—'}</td>`;
    return tr;
  }

  function prependEvent(ev) {
    const tbody = document.getElementById('events-table');
    tbody.prepend(buildRow(ev));
    while (tbody.rows.length > 50) tbody.deleteRow(tbody.rows.length-1);
  }

  // ── Alert ──────────────────────────────────────────────
  function showAlert(alert) {
    const b = document.getElementById('alert-banner');
    const isKill = alert.level === 'kill';
    b.style.cssText = `display:flex;border-radius:8px;padding:12px 16px;align-items:center;gap:10px;border:1px solid ${isKill?'rgba(248,113,113,.25)':'rgba(245,158,11,.25)'};background:${isKill?'rgba(248,113,113,.06)':'rgba(245,158,11,.06)'};color:${isKill?'var(--red)':'var(--amber)'};`;
    document.getElementById('alert-title').textContent = isKill ? 'Loop Kill' : 'Loop Warning';
    document.getElementById('alert-text').textContent  = alert.message;
  }

  function clearAlert() {
    document.getElementById('alert-banner').style.display = 'none';
  }

  connect();
  lucide.createIcons();
</script>
</body>
</html>
